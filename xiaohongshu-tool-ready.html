<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书 콘텐츠 생성 툴 — 레드북 마케팅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8323A;
    --red-dark: #B52028;
    --red-light: #FDEAEA;
    --ink: #1A1214;
    --ink-2: #4A3840;
    --ink-3: #8A7880;
    --bg: #FAF7F5;
    --surface: #FFFFFF;
    --border: #EDE5E0;
    --accent: #F5A623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif KR', serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* 헤더 */
  header {
    background: var(--ink);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--red);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 18px; color: white; font-weight: 500;
    flex-shrink: 0;
  }
  .logo-text {
    font-size: 15px; color: #fff; font-weight: 600; letter-spacing: -0.3px;
  }
  .logo-sub { font-size: 11px; color: #8A7880; font-family: 'DM Mono', monospace; }
  .header-badge {
    margin-left: auto;
    background: #2A1F22;
    color: var(--red);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid #3A2F32;
  }

  /* 레이아웃 */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }

  /* 섹션 타이틀 */
  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--ink-3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* 카드 */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  /* 입력 폼 */
  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--ink-2);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  input, textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Noto Serif KR', serif;
    color: var(--ink);
    transition: border-color .15s;
    resize: vertical;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--red);
  }
  textarea { min-height: 100px; }

  /* 모드 선택 탭 */
  .mode-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
  }
  .mode-tab {
    flex: 1;
    padding: 10px;
    font-size: 13px;
    font-family: 'Noto Serif KR', serif;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--ink-3);
    transition: all .15s;
    text-align: center;
  }
  .mode-tab.active {
    background: var(--red);
    color: white;
    font-weight: 600;
  }

  /* 태그 선택 */
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .tag-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    transition: all .15s;
    color: var(--ink-2);
    user-select: none;
  }
  .tag-chip.selected {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red-dark);
  }

  /* 생성 버튼 */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-family: 'Noto Serif KR', serif;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-generate:hover { background: var(--red-dark); }
  .btn-generate:disabled { background: #C0A8A8; cursor: not-allowed; }

  /* 결과 영역 */
  .result-area {
    position: sticky;
    top: 84px;
  }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .result-header {
    padding: 14px 20px;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-header-title {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: #8A7880;
    letter-spacing: 1px;
  }
  .result-actions {
    display: flex;
    gap: 8px;
  }
  .btn-sm {
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border: 1px solid #3A2F32;
    background: transparent;
    color: #8A7880;
    transition: all .15s;
  }
  .btn-sm:hover { border-color: var(--red); color: var(--red); }
  .btn-sm.primary { background: var(--red); color: white; border-color: var(--red); }
  .btn-sm.primary:hover { background: var(--red-dark); }

  .result-body {
    padding: 24px;
    min-height: 300px;
  }
  .placeholder-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 280px;
    color: var(--ink-3);
    text-align: center;
    gap: 12px;
  }
  .placeholder-icon {
    font-size: 40px;
    opacity: 0.4;
  }
  .placeholder-text {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    line-height: 1.6;
  }

  /* 로딩 */
  .loading-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 280px;
    gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--ink-3);
  }

  /* 결과 콘텐츠 */
  .result-content { display: none; }
  .result-lang-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .lang-tab {
    padding: 5px 14px;
    border-radius: 5px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--ink-3);
    transition: all .15s;
  }
  .lang-tab.active {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red-dark);
  }
  .result-text-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    min-height: 180px;
  }
  .result-text-block.chinese {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
  }
  .hashtag-area {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .hashtag-pill {
    background: var(--red-light);
    color: var(--red-dark);
    font-size: 12px;
    font-family: 'Noto Sans SC', sans-serif;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #F5C5C5;
  }

  /* 히스토리 */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .history-item {
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    transition: border-color .15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item:hover { border-color: var(--red); }
  .history-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
  }

  /* 반응형 */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .result-area { position: static; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">红</div>
  <div>
    <div class="logo-text">레드북 마케팅</div>
    <div class="logo-sub">내부 콘텐츠 생성 툴</div>
  </div>
  <div class="header-badge">INTERNAL TOOL v1.0</div>
</header>

<div class="main">

  <!-- 왼쪽: 입력 폼 -->
  <div>
    <div class="section-title">모드 선택</div>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('generate')">✦ 콘텐츠 자동 생성</button>
      <button class="mode-tab" onclick="setMode('translate')">⇄ 한→중 현지화</button>
    </div>

    <!-- 생성 모드 -->
    <div id="mode-generate">
      <div class="card">
        <div class="form-group">
          <label>매장/브랜드명</label>
          <input type="text" id="brand-name" placeholder="예: 성수 와인바 &apos;오크&apos;">
        </div>
        <div class="form-group">
          <label>업종</label>
          <select id="category">
            <option value="restaurant">레스토랑 / 맛집</option>
            <option value="cafe">카페 / 디저트</option>
            <option value="bar">바 / 펍</option>
            <option value="experience">체험 / 액티비티</option>
            <option value="beauty">뷰티 / 스파</option>
            <option value="shopping">쇼핑</option>
          </select>
        </div>
        <div class="form-group">
          <label>핵심 셀링 포인트 (한국어로 자유롭게)</label>
          <textarea id="selling-points" placeholder="예: 성수동 루프탑 뷰, 내추럴 와인 특화, 예약 필수, 인스타 감성 분위기, 소수 정예 운영"></textarea>
        </div>
        <div class="form-group">
          <label>콘텐츠 톤</label>
          <div class="tag-row" id="tone-tags">
            <span class="tag-chip selected" onclick="toggleTag(this)">감성적 🌸</span>
            <span class="tag-chip" onclick="toggleTag(this)">트렌디 ✨</span>
            <span class="tag-chip" onclick="toggleTag(this)">럭셔리 💎</span>
            <span class="tag-chip" onclick="toggleTag(this)">친근함 😊</span>
            <span class="tag-chip" onclick="toggleTag(this)">여행팁 🗺️</span>
          </div>
        </div>
        <div class="form-group">
          <label>타겟 감성</label>
          <div class="tag-row" id="target-tags">
            <span class="tag-chip selected" onclick="toggleTag(this)">Z세대 여행자</span>
            <span class="tag-chip" onclick="toggleTag(this)">커플 여행</span>
            <span class="tag-chip" onclick="toggleTag(this)">혼행족</span>
            <span class="tag-chip" onclick="toggleTag(this)">미식 탐방</span>
          </div>
        </div>
        <button class="btn-generate" onclick="generateContent()">
          <span id="btn-icon">✦</span>
          <span id="btn-text">샤오홍슈 포스팅 생성</span>
        </button>
      </div>
    </div>

    <!-- 번역 모드 -->
    <div id="mode-translate" style="display:none">
      <div class="card">
        <div class="form-group">
          <label>번역할 한국어 원문</label>
          <textarea id="translate-input" style="min-height:160px" placeholder="번역할 한국어 텍스트를 입력하세요.&#10;&#10;예: 성수동 숨겨진 루프탑 와인바 발견! 내추럴 와인 전문으로 소규모 운영해서 분위기가 정말 아늑해요. 예약 필수이고 저녁에는 서울 야경도 볼 수 있어요."></textarea>
        </div>
        <div class="form-group">
          <label>현지화 스타일</label>
          <div class="tag-row" id="localize-tags">
            <span class="tag-chip selected" onclick="toggleTag(this)">샤오홍슈 감성</span>
            <span class="tag-chip" onclick="toggleTag(this)">해시태그 추가</span>
            <span class="tag-chip" onclick="toggleTag(this)">이모지 추가</span>
            <span class="tag-chip" onclick="toggleTag(this)">Z세대 말투</span>
          </div>
        </div>
        <button class="btn-generate" onclick="translateContent()">
          <span>⇄</span>
          <span>현지화 번역 시작</span>
        </button>
      </div>
    </div>

    <!-- 최근 생성 히스토리 -->
    <div style="margin-top: 24px;">
      <div class="section-title">최근 생성</div>
      <div class="history-list" id="history-list">
        <div style="font-size:12px; color:var(--ink-3); font-family:'DM Mono',monospace; padding: 8px 0;">
          아직 생성된 콘텐츠가 없어요
        </div>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 결과 -->
  <div class="result-area">
    <div class="section-title">생성 결과</div>
    <div class="result-card">
      <div class="result-header">
        <span class="result-header-title">OUTPUT</span>
        <div class="result-actions" id="result-actions" style="display:none">
          <button class="btn-sm" onclick="copyResult()">복사</button>
          <button class="btn-sm primary" onclick="copyResult()">✓ 사용하기</button>
        </div>
      </div>
      <div class="result-body">
        <!-- 초기 안내 -->
        <div class="placeholder-state" id="placeholder">
          <div class="placeholder-icon">📝</div>
          <div class="placeholder-text">
            왼쪽에 정보를 입력하고<br>생성 버튼을 누르면<br>여기에 결과가 나와요
          </div>
        </div>
        <!-- 로딩 -->
        <div class="loading-state" id="loading">
          <div class="spinner"></div>
          <div class="loading-text" id="loading-text">Claude AI가 작성 중...</div>
        </div>
        <!-- 결과 -->
        <div class="result-content" id="result-content">
          <div class="result-lang-tabs">
            <button class="lang-tab active" onclick="showLang('zh')">中文 버전</button>
            <button class="lang-tab" onclick="showLang('ko')">한국어 원문</button>
          </div>
          <div id="result-zh" class="result-text-block chinese"></div>
          <div id="result-ko" class="result-text-block" style="display:none"></div>
          <div class="hashtag-area" id="hashtag-area"></div>
          <div style="margin-top:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <span style="font-size:11px; color:var(--ink-3); font-family:'DM Mono',monospace;">생성 완료 · <span id="result-time"></span></span>
            <span style="font-size:10px; background:#E8F5EE; color:#1A6640; border:1px solid #B8DFC9; padding:2px 8px; border-radius:10px; font-family:'DM Mono',monospace;">✓ 샤오홍슈 정책 준수</span>
          </div>
          <div style="margin-top:6px; font-size:10px; color:var(--ink-3); line-height:1.6; font-family:'DM Mono',monospace;">
            최상급·과장·외부연락처 표현 자동 배제 적용 · 게시 전 최종 검토 권장
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  let currentMode = 'generate';
  let history = [];

  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach((t, i) => {
      t.classList.toggle('active', (mode === 'generate' && i === 0) || (mode === 'translate' && i === 1));
    });
    document.getElementById('mode-generate').style.display = mode === 'generate' ? 'block' : 'none';
    document.getElementById('mode-translate').style.display = mode === 'translate' ? 'block' : 'none';
  }

  function toggleTag(el) {
    el.classList.toggle('selected');
  }

  function getSelectedTags(containerId) {
    return [...document.querySelectorAll(`#${containerId} .tag-chip.selected`)]
      .map(t => t.textContent.trim());
  }

  function showLoading(msg) {
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('result-content').style.display = 'none';
    document.getElementById('result-actions').style.display = 'none';
    document.getElementById('loading-text').textContent = msg || 'Claude AI가 작성 중...';
  }

  function showResult(zhText, koText, hashtags) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result-content').style.display = 'block';
    document.getElementById('result-actions').style.display = 'flex';
    document.getElementById('result-zh').textContent = zhText;
    document.getElementById('result-ko').textContent = koText;
    document.getElementById('result-time').textContent = new Date().toLocaleTimeString('ko-KR');

    const hashtagArea = document.getElementById('hashtag-area');
    hashtagArea.innerHTML = '';
    hashtags.forEach(tag => {
      const pill = document.createElement('span');
      pill.className = 'hashtag-pill';
      pill.textContent = tag;
      hashtagArea.appendChild(pill);
    });

    showLang('zh');
  }

  function showLang(lang) {
    document.querySelectorAll('.lang-tab').forEach((t, i) => {
      t.classList.toggle('active', (lang === 'zh' && i === 0) || (lang === 'ko' && i === 1));
    });
    document.getElementById('result-zh').style.display = lang === 'zh' ? 'block' : 'none';
    document.getElementById('result-ko').style.display = lang === 'ko' ? 'block' : 'none';
  }

  function addHistory(label) {
    const item = { label, time: new Date().toLocaleTimeString('ko-KR') };
    history.unshift(item);
    if (history.length > 5) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = history.map(h => `
      <div class="history-item">
        <span>${h.label}</span>
        <span class="history-time">${h.time}</span>
      </div>
    `).join('');
  }

  function copyResult() {
    const activeText = document.getElementById('result-zh').style.display !== 'none'
      ? document.getElementById('result-zh').textContent
      : document.getElementById('result-ko').textContent;
    navigator.clipboard.writeText(activeText).then(() => {
      const btn = document.querySelector('.btn-sm.primary');
      const original = btn.textContent;
      btn.textContent = '✓ 복사됨!';
      setTimeout(() => btn.textContent = original, 1500);
    });
  }

  async function generateContent() {
    const brandName = document.getElementById('brand-name').value.trim();
    const sellingPoints = document.getElementById('selling-points').value.trim();
    const category = document.getElementById('category').value;
    const tones = getSelectedTags('tone-tags');
    const targets = getSelectedTags('target-tags');

    if (!brandName || !sellingPoints) {
      alert('매장명과 셀링 포인트를 입력해주세요!');
      return;
    }

    const btn = document.querySelector('.btn-generate');
    btn.disabled = true;
    showLoading('Claude AI가 샤오홍슈 감성으로 작성 중...');

    const categoryMap = {
      restaurant: '레스토랑/맛집', cafe: '카페/디저트',
      bar: '바/펍', experience: '체험/액티비티',
      beauty: '뷰티/스파', shopping: '쇼핑'
    };
